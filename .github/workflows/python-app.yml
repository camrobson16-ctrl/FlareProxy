name: CI

on:
push:
branches: [ main ]
pull_request:
branches: [ main ]

jobs:
unit:
runs-on: ${{ matrix.os }}
strategy:
matrix:
os: [ubuntu-latest, windows-latest]
python-version: [3.11, 3.12]
steps:
- uses: actions/checkout@v4
- name: Set up Python ${{ matrix.python-version }}
uses: actions/setup-python@v4
with:
python-version: ${{ matrix.python-version }}
- name: Install dependencies
run: |
python -m pip install --upgrade pip
pip install -r requirements.txt
- name: Run unit tests
run: python -m unittest discover -v -s tests -p "test_payload_assertions.py"
- name: Lint (optional)
run: |
pip install flake8
flake8 .

all-tests:
runs-on: ubuntu-latest
needs: unit
services:
flaresolverr:
image: ghcr.io/flaresolverr/flaresolverr:latest
ports:
- 8191:8191
options: >-
--health-cmd "curl -f http://localhost:8191/v1 || exit 1"
--health-interval 10s
--health-timeout 5s
--health-retries 10
env:
# Point the proxy to the local service started above
FLARESOLVERR_URL: http://127.0.0.1:8191/v1
steps:
- uses: actions/checkout@v4
- name: Wait for FlareSolverr to be ready
run: |
for i in {1..30}; do
if curl -sS http://127.0.0.1:8191/v1 >/dev/null 2>&1; then
echo "FlareSolverr is up"
exit 0
fi
echo "Waiting for FlareSolverr..."
sleep 1
done
echo "FlareSolverr did not become ready" >&2
exit 1
- name: Set up Python 3.12
uses: actions/setup-python@v4
with:
python-version: 3.12
- name: Install dependencies
run: |
python -m pip install --upgrade pip
pip install -r requirements.txt
- name: Run full test suite (unit + integration)
run: python -m unittest discover -v -s tests -p "test_*.py"